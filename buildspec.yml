version: 0.2

env:
  variables:
    DOCKERFILE_PATH: "secure/Dockerfile"
    IMAGE_NAME: "devsecops-demo"
    TRIVY_VERSION: "0.70.0"
    TRIVY_SEVERITY: "HIGH,CRITICAL"
  shell: bash

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - echo "===== Instalando Trivy v$TRIVY_VERSION usando el instalador
        oficial ====="
      - curl -sfL
        https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh
        | sh -s -- -b /usr/local/bin v${TRIVY_VERSION}
      - which trivy
      - trivy --version

  pre_build:
    commands:
      - echo "===== Login a ECR ====="
      - aws --version
      - AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output
        text)
      - ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com/${IMAGE_NAME}"
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login
        --username AWS --password-stdin
        "${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_DEFAULT_REGION}.amazonaws.com"
      - IMAGE_TAG=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-8)
      - echo "Imagen objetivo ${ECR_URI}:${IMAGE_TAG}"
      - echo "===== [SEC-1] Trivy CONFIG SCAN sobre el Dockerfile ====="
      - trivy config --severity "$TRIVY_SEVERITY" --exit-code 1 --format table
        "$DOCKERFILE_PATH"
      - echo "===== [SEC-2] Trivy FS SCAN (secretos en el repo) ====="
      - trivy fs --scanners secret --severity "$TRIVY_SEVERITY" --exit-code 1
        --format table .

  build:
    commands:
      - echo "===== Build de la imagen Docker ====="
      - docker build -f "$DOCKERFILE_PATH" -t "${IMAGE_NAME}:${IMAGE_TAG}" .
      - docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${ECR_URI}:${IMAGE_TAG}"
      - docker tag "${IMAGE_NAME}:${IMAGE_TAG}" "${ECR_URI}:latest"
      - echo "===== [SEC-3] Trivy IMAGE SCAN (CVEs + secretos en layers) ====="
      - trivy image --severity "$TRIVY_SEVERITY" --exit-code 1 --ignore-unfixed
        --scanners vuln,secret,misconfig --format table
        "${IMAGE_NAME}:${IMAGE_TAG}"
      - trivy image --severity "$TRIVY_SEVERITY" --ignore-unfixed --scanners
        vuln,secret,misconfig --format json --output trivy-report.json
        "${IMAGE_NAME}:${IMAGE_TAG}" || true

  post_build:
    commands:
      - echo "===== Imagen aprobada por el security gate. Publicando a ECR ====="
      - docker push "${ECR_URI}:${IMAGE_TAG}"
      - docker push "${ECR_URI}:latest"
      - echo "Publicada ${ECR_URI}:${IMAGE_TAG}"
      - printf '[{"name":"%s","imageUri":"%s"}]' "$IMAGE_NAME"
        "${ECR_URI}:${IMAGE_TAG}" > imagedefinitions.json

reports:
  trivy-security-report:
    files:
      - trivy-report.json
    file-format: JSON

artifacts:
  files:
    - imagedefinitions.json
    - trivy-report.json
  discard-paths: yes
